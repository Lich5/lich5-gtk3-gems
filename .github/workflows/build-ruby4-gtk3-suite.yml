name: Build Ruby4 GTK3 Suite

on:
  workflow_dispatch:
    inputs:
      msys-source:
        description: "Use the current latest MSYS2 base archive or a dated archive."
        required: false
        default: "current"
        type: choice
        options:
          - "current"
          - "dated"
      snapshot-date:
        description: "MSYS2 base archive date for msys-source=dated, for example 20250830."
        required: false
        default: "20250830"
      ruby-installer-version:
        description: "RubyInstaller UCRT archive version, for example 4.0.5-1."
        required: false
        default: "4.0.5-1"
      ruby-gnome-version:
        description: "Ruby-GNOME suite version to build."
        required: false
        default: "4.3.6"
      cairo-version:
        description: "rcairo version to build."
        required: false
        default: "1.18.5"
      glib2-gc-repair:
        description: "Optional glib2 patch for Ruby-defined GObject property retention."
        required: false
        default: "cache-ruby-property-setter-values"
        type: choice
        options:
          - "cache-ruby-property-setter-values"
          - "none"
      dependency-closure-source:
        description: "Source for non-GTK Lich runtime gem closure."
        required: false
        default: "explicit-list"
        type: choice
        options:
          - "explicit-list"
          - "gemfile-lock"
      gemfile-lock-path:
        description: "Future hook: Gemfile.lock path when dependency-closure-source=gemfile-lock."
        required: false
        default: "Gemfile.lock"
      lich-runtime-gems:
        description: "Whitespace or comma separated top-level runtime gems to install when dependency-closure-source=explicit-list."
        required: false
        default: "gtk3 sqlite3 ox ascii_charts curses os redis sequel set terminal-table kramdown tzinfo tzinfo-data concurrent-ruby ffi webrick"
      lich-native-runtime-gems:
        description: "Whitespace or comma separated Lich runtime gems that must resolve to binary platform gems."
        required: false
        default: "sqlite3 ox ffi curses"

permissions:
  contents: read

jobs:
  build_ruby4_gtk3_suite:
    name: Build Ruby4 GTK3 suite (windows-ucrt64)
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      PLATFORM_LANE: windows-ucrt64
      MSYSTEM: UCRT64
      MSYS2_PREFIX: ucrt64
      MSYS2_PACKAGE_PREFIX: mingw-w64-ucrt-x86_64
      GEM_PLATFORM: x64-mingw-ucrt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate inputs
        shell: powershell
        run: |
          $msysSource = '${{ inputs.msys-source }}'
          $snapshotDate = '${{ inputs.snapshot-date }}'
          $rubyInstallerVersion = '${{ inputs.ruby-installer-version }}'
          $rubyGnomeVersion = '${{ inputs.ruby-gnome-version }}'
          $cairoVersion = '${{ inputs.cairo-version }}'
          $glib2GcRepair = '${{ inputs.glib2-gc-repair }}'
          $dependencyClosureSource = '${{ inputs.dependency-closure-source }}'
          $gemfileLockPath = '${{ inputs.gemfile-lock-path }}'
          $lichRuntimeGems = '${{ inputs.lich-runtime-gems }}'
          $lichNativeRuntimeGems = '${{ inputs.lich-native-runtime-gems }}'

          if ($msysSource -notin @('current', 'dated')) {
            Write-Error "msys-source must be 'current' or 'dated'; received '$msysSource'."
            exit 1
          }
          if ($snapshotDate -notmatch '^\d{8}$') {
            Write-Error "snapshot-date must be YYYYMMDD, for example 20250830; received '$snapshotDate'."
            exit 1
          }
          if ($rubyInstallerVersion -notmatch '^\d+\.\d+\.\d+-\d+$') {
            Write-Error "ruby-installer-version must look like N.N.N-N, for example 4.0.5-1; received '$rubyInstallerVersion'."
            exit 1
          }
          if ($rubyGnomeVersion -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "ruby-gnome-version must look like N.N.N; received '$rubyGnomeVersion'."
            exit 1
          }
          if ($cairoVersion -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "cairo-version must look like N.N.N; received '$cairoVersion'."
            exit 1
          }
          if ($glib2GcRepair -notin @('cache-ruby-property-setter-values', 'none')) {
            Write-Error "glib2-gc-repair must be 'cache-ruby-property-setter-values' or 'none'; received '$glib2GcRepair'."
            exit 1
          }
          if ($dependencyClosureSource -notin @('explicit-list', 'gemfile-lock')) {
            Write-Error "dependency-closure-source must be 'explicit-list' or 'gemfile-lock'; received '$dependencyClosureSource'."
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($gemfileLockPath)) {
            Write-Error "gemfile-lock-path must not be empty."
            exit 1
          }
          if ($dependencyClosureSource -eq 'explicit-list' -and [string]::IsNullOrWhiteSpace($lichRuntimeGems)) {
            Write-Error "lich-runtime-gems must list at least one gem when dependency-closure-source=explicit-list."
            exit 1
          }

          "MSYS2_SOURCE=$msysSource" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYS2_SNAPSHOT_DATE=$snapshotDate" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_INSTALLER_VERSION=$rubyInstallerVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_GNOME_VERSION=$rubyGnomeVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "CAIRO_VERSION=$cairoVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GLIB2_GC_REPAIR=$glib2GcRepair" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "DEPENDENCY_CLOSURE_SOURCE=$dependencyClosureSource" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GEMFILE_LOCK_PATH=$gemfileLockPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "LICH_RUNTIME_GEMS=$lichRuntimeGems" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "LICH_NATIVE_RUNTIME_GEMS=$lichNativeRuntimeGems" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download and extract MSYS2 base archive
        shell: powershell
        run: |
          $snapshotDate = $env:MSYS2_SNAPSHOT_DATE
          $msysSource = $env:MSYS2_SOURCE
          $msysParent = 'C:\Ruby4Lich5'
          $msys = Join-Path $msysParent 'msys64'
          $distribUrl = 'https://repo.msys2.org/distrib/x86_64/'

          if ($msysSource -eq 'current') {
            Write-Host "Resolving newest MSYS2 base archive from $distribUrl"
            $index = Invoke-WebRequest -Uri $distribUrl -UseBasicParsing
            $archiveName = @(
              [regex]::Matches($index.Content, 'msys2-base-x86_64-\d{8}\.tar\.zst') |
                ForEach-Object { $_.Value } |
                Sort-Object -Unique -Descending
            ) | Select-Object -First 1
            if (-not $archiveName) {
              Write-Error "MSYS2 current archive resolution failed: no dated msys2-base-x86_64-YYYYMMDD.tar.zst entries found at $distribUrl."
              exit 1
            }
          } else {
            $archiveName = "msys2-base-x86_64-$snapshotDate.tar.zst"
          }

          $archive = Join-Path $env:RUNNER_TEMP $archiveName
          $url = "$distribUrl$archiveName"
          if (Test-Path $msysParent) {
            Remove-Item $msysParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $msysParent -Force | Out-Null

          Write-Host "Resolved MSYS2 archive: $archiveName"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          if (!(Test-Path $archive)) {
            Write-Error "MSYS2 download failed: expected archive $archive was not created."
            exit 1
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }

          $extractWork = Join-Path $env:RUNNER_TEMP "msys2-base-$msysSource-$snapshotDate"
          if (Test-Path $extractWork) {
            Remove-Item $extractWork -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractWork -Force | Out-Null

          & $sevenZip x $archive "-o$extractWork" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 zstd extraction failed."
            exit $LASTEXITCODE
          }

          $tarFile = Get-ChildItem $extractWork -Filter '*.tar' -File | Select-Object -First 1
          if (-not $tarFile) {
            Write-Error "MSYS2 extraction failed: no .tar file found after zstd extraction."
            exit 1
          }

          & $sevenZip x $tarFile.FullName "-o$msysParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 tar extraction failed."
            exit $LASTEXITCODE
          }

          if (!(Test-Path (Join-Path $msys 'usr\bin\pacman.exe'))) {
            Write-Error "MSYS2 base extraction failed: pacman.exe not found under $msys."
            exit 1
          }

          "MSYS2_ROOT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build sanitized PATH
        id: lanepath
        shell: powershell
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          if (!(Test-Path $msys)) {
            Write-Error "Cannot build PATH because MSYS2_ROOT does not exist: $msys"
            exit 1
          }

          $orig = $env:Path -split ';'
          $filtered = $orig | Where-Object {
            $_ -and
            ($_ -notlike '*\Ruby\*\x64\msys64\*') -and
            ($_ -notmatch '^C:\\hostedtoolcache\\windows\\Ruby(\\|$)') -and
            ($_ -ne 'C:\mingw64\bin') -and
            ($_ -notmatch '^C:\\Strawberry(\\|$)')
          }
          $lanePath = @("$msys\$prefix\bin", "$msys\usr\bin") + $filtered
          $joined = ($lanePath -join ';')

          "PATH_GTK3_SUITE=$joined" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "path=$joined" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "RI_DEVKIT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYSTEM_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MINGW_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Initialize MSYS2 keyring
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $env:Path = "$msys\$env:MSYS2_PREFIX\bin;$msys\usr\bin;$env:Path"
          $bash = Join-Path $msys 'usr\bin\bash.exe'
          if (!(Test-Path $bash)) {
            Write-Error "MSYS2 keyring initialization failed: bash.exe not found at $bash."
            exit 1
          }

          & $bash -lc 'pacman-key --init'
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 keyring initialization failed: pacman-key --init exited with $LASTEXITCODE."
            exit $LASTEXITCODE
          }

          & $bash -lc 'pacman-key --populate msys2'
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 keyring initialization failed: pacman-key --populate msys2 exited with $LASTEXITCODE."
            exit $LASTEXITCODE
          }

      - name: Refresh current MSYS2 package universe
        if: ${{ inputs.msys-source == 'current' }}
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $env:Path = "$msys\$env:MSYS2_PREFIX\bin;$msys\usr\bin;$env:Path"
          $bash = Join-Path $msys 'usr\bin\bash.exe'
          & $bash -lc 'pacman -Syu --noconfirm'
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Current MSYS2 refresh failed: pacman -Syu exited with $LASTEXITCODE."
            exit $LASTEXITCODE
          }

      - name: Install GTK3 native build surface
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $packagePrefix = $env:MSYS2_PACKAGE_PREFIX
          $pacman = Join-Path $msys 'usr\bin\pacman.exe'
          $env:Path = "$msys\$prefix\bin;$msys\usr\bin;$env:Path"

          $packages = @(
            "$packagePrefix-gcc",
            "$packagePrefix-gcc-libs",
            "$packagePrefix-binutils",
            "$packagePrefix-make",
            "$packagePrefix-pkgconf",
            "$packagePrefix-gobject-introspection",
            "$packagePrefix-gobject-introspection-runtime",
            "$packagePrefix-gtk3",
            "make"
          )
          $optionalPackages = @(
            "$packagePrefix-pdcurses",
            "$packagePrefix-ncurses"
          )
          foreach ($optionalPackage in $optionalPackages) {
            & $pacman -Si $optionalPackage *> $null
            if ($LASTEXITCODE -eq 0) {
              $packages += $optionalPackage
            } else {
              Write-Host "::notice::Optional native build package $optionalPackage is not available in this MSYS2 package universe."
            }
          }
          & $pacman -S --needed --noconfirm @packages
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSYS2 install failed: pacman could not install the GTK3 native build surface."
            exit $LASTEXITCODE
          }

          Write-Host "::group::Installed package versions"
          & $pacman -Q
          Write-Host "::endgroup::"

          $gcc = Join-Path $msys "$prefix\bin\gcc.exe"
          $pkgc = Join-Path $msys "$prefix\bin\pkg-config.exe"
          "CC=$gcc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG=$pkgc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$msys\$prefix\lib\pkgconfig;$msys\lib\pkgconfig" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download and extract RubyInstaller
        shell: powershell
        run: |
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $rubyParent = 'C:\Ruby4Lich5\ruby'
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"
          $url = "https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-$rubyInstallerVersion/rubyinstaller-$rubyInstallerVersion-x64.7z"

          if (Test-Path $rubyParent) {
            Remove-Item $rubyParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $rubyParent -Force | Out-Null

          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          if (!(Test-Path $archive)) {
            Write-Error "RubyInstaller download failed: expected archive $archive was not created."
            exit 1
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }

          & $sevenZip x $archive "-o$rubyParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $rubyParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "RubyInstaller extraction failed: ruby.exe was not found under $rubyParent."
            exit 1
          }

          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          & $rubyExe.FullName --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller validation failed: ruby.exe could not run."
            exit $LASTEXITCODE
          }

          $rubyPlatform = & $rubyExe.FullName -e "require 'rubygems'; print Gem::Platform.local.to_s"
          if ($rubyPlatform -ne $env:GEM_PLATFORM) {
            Write-Error "RubyInstaller validation failed: expected Ruby platform $env:GEM_PLATFORM, got $rubyPlatform."
            exit 1
          }

          $gemExe = Join-Path $rubyRoot 'bin\gem.cmd'
          if (!(Test-Path $gemExe)) {
            Write-Error "RubyInstaller validation failed: gem.cmd was not found at $gemExe."
            exit 1
          }

          "RUBY_ROOT=$rubyRoot" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_EXE=$($rubyExe.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GEM_EXE=$gemExe" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Refresh suite sources to requested versions
        shell: powershell
        run: |
          $rubyGnomeVersion = $env:RUBY_GNOME_VERSION
          $cairoVersion = $env:CAIRO_VERSION
          $repoGems = Join-Path $env:GITHUB_WORKSPACE 'gems'
          $work = Join-Path $env:RUNNER_TEMP 'source-refresh'
          if (Test-Path $work) {
            Remove-Item $work -Recurse -Force
          }
          New-Item -ItemType Directory -Path $work -Force | Out-Null

          $rubyGnomeZip = Join-Path $work "ruby-gnome-$rubyGnomeVersion.zip"
          $rubyGnomeUrl = "https://github.com/ruby-gnome/ruby-gnome/archive/refs/tags/$rubyGnomeVersion.zip"
          Write-Host "Downloading Ruby-GNOME $rubyGnomeVersion from $rubyGnomeUrl"
          Invoke-WebRequest -Uri $rubyGnomeUrl -OutFile $rubyGnomeZip -UseBasicParsing
          Expand-Archive -Path $rubyGnomeZip -DestinationPath $work -Force
          $rubyGnomeRoot = Join-Path $work "ruby-gnome-$rubyGnomeVersion"
          if (!(Test-Path $rubyGnomeRoot)) {
            Write-Error "Source refresh failed: Ruby-GNOME source did not expand to $rubyGnomeRoot."
            exit 1
          }

          Push-Location $work
          & $env:GEM_EXE fetch cairo --version $cairoVersion --clear-sources --source https://rubygems.org
          $fetchExit = $LASTEXITCODE
          Pop-Location
          $cairoGem = Join-Path $work "cairo-$cairoVersion.gem"
          if ($fetchExit -ne 0 -or !(Test-Path $cairoGem)) {
            Write-Error "Source refresh failed: cairo $cairoVersion gem could not be fetched."
            exit 1
          }
          Push-Location $work
          & $env:GEM_EXE unpack $cairoGem
          if ($LASTEXITCODE -ne 0) {
            Pop-Location
            Write-Error "Source refresh failed: cairo $cairoVersion gem could not be unpacked."
            exit $LASTEXITCODE
          }
          Pop-Location
          $cairoRoot = Join-Path $work "cairo-$cairoVersion"
          if (!(Test-Path $cairoRoot)) {
            Write-Error "Source refresh failed: cairo source did not unpack to $cairoRoot."
            exit 1
          }

          $rubyGnomeGems = @(
            'glib2',
            'gobject-introspection',
            'gio2',
            'cairo-gobject',
            'pango',
            'gdk_pixbuf2',
            'atk',
            'gdk3',
            'gtk3'
          )

          $binaryLoaderFiles = @{
            'glib2' = @('lib\glib2.rb')
            'gobject-introspection' = @(
              'lib\gobject-introspection.rb',
              'lib\rubygems_plugin.rb'
            )
            'gio2' = @('lib\gio2\loader.rb')
            'cairo-gobject' = @('lib\cairo-gobject.rb')
            'pango' = @('lib\pango\loader.rb')
            'gtk3' = @('lib\gtk3\loader.rb')
          }

          foreach ($gemName in $rubyGnomeGems) {
            $target = Join-Path $repoGems $gemName
            $source = Join-Path $rubyGnomeRoot $gemName
            if (!(Test-Path $source)) {
              Write-Error "Source refresh failed: missing Ruby-GNOME source directory $source."
              exit 1
            }
            $preserve = Join-Path $work "preserve-$gemName"
            New-Item -ItemType Directory -Path $preserve -Force | Out-Null
            Copy-Item (Join-Path $target "$gemName.gemspec") $preserve -Force
            if ($binaryLoaderFiles.ContainsKey($gemName)) {
              foreach ($relativePath in $binaryLoaderFiles[$gemName]) {
                $sourceLoader = Join-Path $target $relativePath
                if (Test-Path $sourceLoader) {
                  $preservedLoader = Join-Path $preserve $relativePath
                  New-Item -ItemType Directory -Path (Split-Path $preservedLoader -Parent) -Force | Out-Null
                  Copy-Item $sourceLoader $preservedLoader -Force
                }
              }
            }

            Remove-Item $target -Recurse -Force
            Copy-Item $source $target -Recurse -Force
            Copy-Item (Join-Path $preserve "$gemName.gemspec") $target -Force
            if ($binaryLoaderFiles.ContainsKey($gemName)) {
              foreach ($relativePath in $binaryLoaderFiles[$gemName]) {
                $preservedLoader = Join-Path $preserve $relativePath
                if (Test-Path $preservedLoader) {
                  $targetLoader = Join-Path $target $relativePath
                  New-Item -ItemType Directory -Path (Split-Path $targetLoader -Parent) -Force | Out-Null
                  Copy-Item $preservedLoader $targetLoader -Force
                }
              }
            }
            Set-Content -Path (Join-Path $target '.upstream-version') -Value $rubyGnomeVersion -Encoding ascii
          }

          $cairoTarget = Join-Path $repoGems 'cairo'
          $cairoPreserve = Join-Path $work 'preserve-cairo'
          New-Item -ItemType Directory -Path $cairoPreserve -Force | Out-Null
          Copy-Item (Join-Path $cairoTarget 'cairo.gemspec') $cairoPreserve -Force
          Copy-Item (Join-Path $cairoTarget 'lib\cairo.rb') $cairoPreserve -Force

          Remove-Item $cairoTarget -Recurse -Force
          Copy-Item $cairoRoot $cairoTarget -Recurse -Force
          Copy-Item (Join-Path $cairoPreserve 'cairo.gemspec') $cairoTarget -Force
          Copy-Item (Join-Path $cairoPreserve 'cairo.rb') (Join-Path $cairoTarget 'lib\cairo.rb') -Force
          Set-Content -Path (Join-Path $cairoTarget '.upstream-version') -Value $cairoVersion -Encoding ascii

          $cairoGemspec = Join-Path $cairoTarget 'cairo.gemspec'
          $cairoSpec = Get-Content $cairoGemspec -Raw
          $cairoSpec = $cairoSpec.Replace('1.18.4', $cairoVersion)
          $cairoSpec = $cairoSpec.Replace('= 4.3.4', "= $rubyGnomeVersion")
          Set-Content -Path $cairoGemspec -Value $cairoSpec -Encoding ascii

      - name: Assert clean Ruby4 UCRT source refresh
        shell: powershell
        run: |
          $repoGems = Join-Path $env:GITHUB_WORKSPACE 'gems'
          $staleNames = @(
            'Makefile',
            'mkmf.log',
            'glib-enum-types.c',
            'glib-enum-types.h',
            'gobject-introspection-enum-types.c',
            'gobject-introspection-enum-types.h'
          )
          $staleExtensions = @('.o', '.so', '.dll')
          $stale = @(Get-ChildItem -Path $repoGems -Recurse -File |
            Where-Object {
              $_.FullName -like '*\ext\*' -and
              ($staleNames -contains $_.Name -or $staleExtensions -contains $_.Extension)
            } |
            Sort-Object FullName -Unique)
          if ($stale.Count -gt 0) {
            Write-Host "::group::Stale generated/native files"
            $stale | ForEach-Object { Write-Host $_.FullName }
            Write-Host "::endgroup::"
            Write-Error "Clean source assertion failed: generated native build files are present before the Ruby4 UCRT build."
            exit 1
          }

          Write-Host "Ruby4 UCRT source refresh is clean: upstream lib trees are in use and no generated native files are present."

      - name: Report vendored source versions
        shell: powershell
        run: |
          Write-Host "::group::Vendored source versions"
          Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'gems') -Filter '.upstream-version' -Recurse |
            Sort-Object FullName |
            ForEach-Object {
              $gemName = Split-Path $_.DirectoryName -Leaf
              $version = (Get-Content $_.FullName -Raw).Trim()
              Write-Host "$gemName $version"
            }
          Write-Host "::endgroup::"

      - name: Patch glib2 GC repair
        if: ${{ inputs.glib2-gc-repair == 'cache-ruby-property-setter-values' }}
        shell: powershell
        run: |
          $objectSource = Join-Path $env:GITHUB_WORKSPACE 'gems\glib2\ext\glib2\rbgobj_object.c'
          if (!(Test-Path $objectSource)) {
            Write-Error "glib2 patch failed: source not found at $objectSource."
            exit 1
          }

          $old = '    rb_funcall(GOBJ2RVAL(object), ruby_setter, 1, GVAL2RVAL(value));'
          $new = @(
            '    {',
            '        VALUE rb_object = GOBJ2RVAL(object);',
            '        VALUE rb_value = GVAL2RVAL(value);',
            '        rb_funcall(rb_object, ruby_setter, 1, rb_value);',
            '        if (G_TYPE_IS_OBJECT(G_PARAM_SPEC_VALUE_TYPE(pspec))) {',
            '            G_CHILD_SET(rb_object, rb_intern(g_param_spec_get_name(pspec)), rb_value);',
            '        }',
            '    }'
          ) -join "`n"
          $content = Get-Content $objectSource -Raw
          if (-not $content.Contains($old)) {
            Write-Error "glib2 patch failed: patch anchor was not found in $objectSource."
            exit 1
          }
          Set-Content -Path $objectSource -Value $content.Replace($old, $new.TrimEnd()) -Encoding ascii
          Write-Host "Applied glib2 GC repair patch to $objectSource"

      - name: Build local GTK3 gem suite
        shell: powershell
        env:
          BINARY_GEM: "true"
          KEEP_BUILT_EXTENSIONS: "true"
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $rubyRoot = $env:RUBY_ROOT
          $rubyExe = $env:RUBY_EXE
          $gemExe = $env:GEM_EXE
          $env:Path = "$rubyRoot\bin;$msys\$prefix\bin;$msys\usr\bin;$env:Path"
          $env:RI_DEVKIT = $msys
          $env:MSYSTEM_PREFIX = "/$prefix"
          $env:MINGW_PREFIX = "/$prefix"
          $env:RCAIRO_SOURCE_DIR = Join-Path $env:GITHUB_WORKSPACE 'gems\cairo'

          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          if (Test-Path $pkgDir) {
            Remove-Item $pkgDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $pkgDir -Force | Out-Null

          & $gemExe install rake pkg-config native-package-installer
          if ($LASTEXITCODE -ne 0) {
            Write-Error "GTK3 suite build failed: prerequisite gems could not install."
            exit $LASTEXITCODE
          }

          Write-Host "::group::GTK3 suite build surface"
          Write-Host "RUBY_ROOT=$rubyRoot"
          Write-Host "GEM_PLATFORM=$env:GEM_PLATFORM"
          Write-Host "MSYSTEM=$env:MSYSTEM"
          Write-Host "MSYSTEM_PREFIX=$env:MSYSTEM_PREFIX"
          Write-Host "MINGW_PREFIX=$env:MINGW_PREFIX"
          Write-Host "CC=$env:CC"
          Write-Host "PKG_CONFIG=$env:PKG_CONFIG"
          & $env:PKG_CONFIG --modversion gtk+-3.0 gobject-introspection-1.0 glib-2.0 cairo pango
          Write-Host "::endgroup::"

          $gems = @(
            'glib2',
            'gobject-introspection',
            'gio2',
            'cairo',
            'cairo-gobject',
            'pango',
            'gdk_pixbuf2',
            'atk',
            'gdk3',
            'gtk3'
          )

          foreach ($gemName in $gems) {
            Write-Host "::group::Build $gemName"
            $extDir = Join-Path $env:GITHUB_WORKSPACE "gems\$gemName\ext\$gemName"
            if (Test-Path $extDir) {
              @(
                'Makefile',
                'mkmf.log',
                'glib-enum-types.c',
                'glib-enum-types.h',
                'gobject-introspection-enum-types.c',
                'gobject-introspection-enum-types.h'
              ) | ForEach-Object {
                $path = Join-Path $extDir $_
                if (Test-Path $path) {
                  Remove-Item $path -Force
                }
              }
              Get-ChildItem -Path $extDir -Recurse -File |
                Where-Object { $_.Extension -in @('.o', '.so', '.dll') } |
                Remove-Item -Force
            }
            & $rubyExe -I. -e "require 'rake'; Rake.application.load_rakefile; Rake::Task['build:gem'].invoke('$gemName')"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "GTK3 suite build failed while building $gemName."
              exit $LASTEXITCODE
            }

            if ($gemName -eq 'gobject-introspection') {
              $giVendor = Join-Path $env:GITHUB_WORKSPACE 'gems\gobject-introspection\vendor\local'
              $typelibDst = Join-Path $giVendor 'lib\girepository-1.0'
              $fontDst = Join-Path $giVendor 'etc\fonts'
              $loaderDst = Join-Path $giVendor 'lib\gdk-pixbuf-2.0\2.10.0\loaders'
              New-Item -ItemType Directory -Force -Path $typelibDst, $fontDst, $loaderDst | Out-Null

              Copy-Item "$msys\$prefix\lib\girepository-1.0\*.typelib" $typelibDst -Force

              $prefixBin = Join-Path $msys "$prefix\bin"
              $objdump = Join-Path $prefixBin 'objdump.exe'
              $gIrInspect = Join-Path $prefixBin 'g-ir-inspect.exe'
              if (!(Test-Path $objdump)) {
                Write-Error "GTK3 suite build failed: objdump.exe was not found at $objdump; cannot derive runtime DLL closure."
                exit 1
              }
              if (!(Test-Path $gIrInspect)) {
                Write-Error "GTK3 suite build failed: g-ir-inspect.exe was not found at $gIrInspect; cannot derive GI shared-library roots."
                exit 1
              }

              $runtimeDlls = [System.Collections.Hashtable]::new([StringComparer]::OrdinalIgnoreCase)

              function Get-DllDependencies([string] $path) {
                if (!(Test-Path $path)) {
                  return @()
                }
                @(& $objdump -p $path 2>$null |
                  Select-String -Pattern 'DLL Name:\s*(.+)$' |
                  ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() } |
                  Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
                  Sort-Object -Unique)
              }

              function Add-DllClosure([string] $dllName) {
                if ([string]::IsNullOrWhiteSpace($dllName)) {
                  return
                }
                $dllPath = Join-Path $prefixBin $dllName
                if (!(Test-Path $dllPath)) {
                  Write-Host "::notice::Runtime DLL dependency $dllName is not in $prefixBin; assuming system or non-UCRT dependency."
                  return
                }
                if ($runtimeDlls.ContainsKey($dllName)) {
                  return
                }
                $runtimeDlls[$dllName] = $dllPath
                foreach ($dependency in Get-DllDependencies $dllPath) {
                  Add-DllClosure $dependency
                }
              }

              function Add-DllDependenciesFromPath([string] $path) {
                foreach ($dependency in Get-DllDependencies $path) {
                  Add-DllClosure $dependency
                }
              }

              $env:GI_TYPELIB_PATH = "$msys\$prefix\lib\girepository-1.0"
              Get-ChildItem "$msys\$prefix\lib\girepository-1.0" -Filter '*.typelib' -File |
                ForEach-Object {
                  $namespace = $_.BaseName -replace '-[0-9][0-9.]*$', ''
                  $shlibs = @(& $gIrInspect --print-shlibs $namespace 2>$null)
                  if ($LASTEXITCODE -eq 0) {
                    foreach ($line in $shlibs) {
                      foreach ($match in [regex]::Matches($line, '[A-Za-z0-9_+.-]+\.dll')) {
                        Add-DllClosure $match.Value
                      }
                    }
                  } else {
                    Write-Host "::notice::g-ir-inspect could not report shared libraries for namespace $namespace."
                  }
                }

              $fallbackRuntimeRoots = @(
                'libgirepository*.dll',
                'libglib-2.0-0.dll',
                'libgobject-2.0-0.dll',
                'libgio-2.0-0.dll',
                'libgmodule-2.0-0.dll',
                'libgtk-3-0.dll',
                'libgdk-3-0.dll',
                'libgdk_pixbuf-2.0-0.dll',
                'libatk-1.0-0.dll',
                'libpango*.dll',
                'libcairo*.dll'
              )
              foreach ($pattern in $fallbackRuntimeRoots) {
                Get-ChildItem -Path $prefixBin -Filter $pattern -File -ErrorAction SilentlyContinue |
                  ForEach-Object { Add-DllClosure $_.Name }
              }

              Write-Host "::group::Discovered GTK/GI runtime DLL closure"
              foreach ($dll in ($runtimeDlls.Keys | Sort-Object)) {
                Write-Host $dll
              }
              Write-Host "::endgroup::"

              if ($runtimeDlls.Count -eq 0) {
                Write-Error "GTK3 suite build failed: no GTK/GI runtime DLLs were discovered for bundling."
                exit 1
              }

              foreach ($requiredRuntimeDll in @('libgdk_pixbuf-2.0-0.dll', 'libgtk-3-0.dll')) {
                if (-not $runtimeDlls.ContainsKey($requiredRuntimeDll)) {
                  Write-Error "GTK3 suite build failed: expected runtime DLL $requiredRuntimeDll was not discovered in the GTK/GI closure."
                  exit 1
                }
              }

              if (Test-Path "$msys\$prefix\etc\fonts\fonts.conf") {
                Copy-Item "$msys\$prefix\etc\fonts\fonts.conf" $fontDst -Force
              }
              if (Test-Path "$msys\$prefix\etc\fonts\conf.d") {
                Copy-Item "$msys\$prefix\etc\fonts\conf.d" (Join-Path $fontDst 'conf.d') -Recurse -Force
              }

              $loaderSrc = "$msys\$prefix\lib\gdk-pixbuf-2.0\2.10.0\loaders"
              if (Test-Path $loaderSrc) {
                Get-ChildItem -Path $loaderSrc -Filter '*.dll' -File |
                  ForEach-Object {
                    Copy-Item $_.FullName $loaderDst -Force
                    Add-DllDependenciesFromPath $_.FullName
                  }
                $cacheDst = Split-Path $loaderDst -Parent
                $env:GDK_PIXBUF_MODULEDIR = $loaderDst
                & "$msys\$prefix\bin\gdk-pixbuf-query-loaders.exe" | Set-Content (Join-Path $cacheDst 'loaders.cache.in')
                (Get-Content (Join-Path $cacheDst 'loaders.cache.in') -Raw).Replace($loaderDst, '@@MODULEDIR@@') |
                  Set-Content (Join-Path $cacheDst 'loaders.cache.in') -Encoding ascii
              }

              Write-Host "::group::Bundled GTK/GI runtime DLL closure"
              $runtimeBinTargets = @(
                Join-Path $env:GITHUB_WORKSPACE 'gems\glib2\vendor\local\bin'
                Join-Path $env:GITHUB_WORKSPACE 'gems\cairo\vendor\local\bin'
              )
              foreach ($runtimeBinTarget in $runtimeBinTargets) {
                if (Test-Path $runtimeBinTarget) {
                  Remove-Item $runtimeBinTarget -Recurse -Force
                }
                New-Item -ItemType Directory -Path $runtimeBinTarget -Force | Out-Null
              }
              foreach ($dll in ($runtimeDlls.Keys | Sort-Object)) {
                $sourceDll = $runtimeDlls[$dll]
                foreach ($runtimeBinTarget in $runtimeBinTargets) {
                  Copy-Item $sourceDll $runtimeBinTarget -Force
                }
                Write-Host $dll
              }
              Write-Host "::endgroup::"

              $fontConfig = Join-Path $fontDst 'fonts.conf'
              if (!(Test-Path $fontConfig)) {
                Write-Error "GTK3 suite build failed: expected Fontconfig configuration was not bundled at $fontConfig."
                exit 1
              }
              $staleGIVersionReferences = @(Get-ChildItem -Path $giVendor -Recurse -File |
                Select-String -Pattern 'gobject-introspection-4.3.4' -SimpleMatch -List -ErrorAction SilentlyContinue)
              if ($staleGIVersionReferences.Count -gt 0) {
                Write-Host "::group::Stale gobject-introspection 4.3.4 references"
                $staleGIVersionReferences | ForEach-Object { Write-Host $_.Path }
                Write-Host "::endgroup::"
                Write-Error "GTK3 suite build failed: bundled GI vendor assets contain stale gobject-introspection-4.3.4 references."
                exit 1
              }

              Push-Location (Join-Path $env:GITHUB_WORKSPACE 'gems\gobject-introspection')
              & $gemExe build gobject-introspection.gemspec
              if ($LASTEXITCODE -ne 0) {
                Pop-Location
                Write-Error "GTK3 suite build failed: could not rebuild gobject-introspection with bundled GI runtime assets."
                exit $LASTEXITCODE
              }
              $rebuiltGI = Get-ChildItem -Filter 'gobject-introspection-*.gem' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
              Copy-Item $rebuiltGI.FullName (Join-Path $env:GITHUB_WORKSPACE 'pkg') -Force
              Pop-Location

              Push-Location (Join-Path $env:GITHUB_WORKSPACE 'gems\glib2')
              & $gemExe build glib2.gemspec
              if ($LASTEXITCODE -ne 0) {
                Pop-Location
                Write-Error "GTK3 suite build failed: could not rebuild glib2 with bundled GTK/GI runtime assets."
                exit $LASTEXITCODE
              }
              $rebuiltGLib = Get-ChildItem -Filter 'glib2-*.gem' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
              Copy-Item $rebuiltGLib.FullName (Join-Path $env:GITHUB_WORKSPACE 'pkg') -Force
              & $gemExe install $rebuiltGLib.FullName --local --force
              if ($LASTEXITCODE -ne 0) {
                Pop-Location
                Write-Error "GTK3 suite build failed: local install failed for rebuilt $($rebuiltGLib.Name)."
                exit $LASTEXITCODE
              }
              Pop-Location
            }

            $builtGem = Get-ChildItem (Join-Path $env:GITHUB_WORKSPACE 'pkg') -Filter "$gemName-*.gem" |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $builtGem) {
              Write-Error "GTK3 suite build failed: no local gem artifact found for $gemName."
              exit 1
            }

            & $gemExe install $builtGem.FullName --local --force
            if ($LASTEXITCODE -ne 0) {
              Write-Error "GTK3 suite build failed: local install failed for $($builtGem.Name)."
              exit $LASTEXITCODE
            }
            Write-Host "::endgroup::"
          }

      - name: Install and collect Lich runtime gem closure
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $rubyRoot = $env:RUBY_ROOT
          $rubyExe = $env:RUBY_EXE
          $gemExe = $env:GEM_EXE
          $env:Path = "$rubyRoot\bin;$msys\$prefix\bin;$msys\usr\bin;$env:Path"
          $env:RI_DEVKIT = $msys
          $env:MSYSTEM_PREFIX = "/$prefix"
          $env:MINGW_PREFIX = "/$prefix"

          if ($env:DEPENDENCY_CLOSURE_SOURCE -eq 'gemfile-lock') {
            Write-Error "Gemfile.lock dependency closure is reserved but not implemented yet. Use dependency-closure-source=explicit-list until Gemfile.lock parsing is wired for Lich."
            exit 1
          }

          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          New-Item -ItemType Directory -Path $pkgDir -Force | Out-Null

          $runtimeGems = @(
            ($env:LICH_RUNTIME_GEMS -split '[,\s]+') |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object -Unique
          )
          $nativeRuntimeGems = @(
            ($env:LICH_NATIVE_RUNTIME_GEMS -split '[,\s]+') |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object -Unique
          )
          $nativeRuntimeRepackGems = @('ox', 'curses')
          if ($runtimeGems.Count -eq 0) {
            Write-Error "Lich runtime gem closure failed: no gems were selected."
            exit 1
          }
          foreach ($gemName in $nativeRuntimeGems) {
            if ($runtimeGems -notcontains $gemName) {
              Write-Error "Lich runtime gem closure failed: native runtime gem $gemName is not present in lich-runtime-gems."
              exit 1
            }
          }

          Write-Host "::group::Install Lich runtime gems"
          Write-Host "Dependency closure source: $env:DEPENDENCY_CLOSURE_SOURCE"
          Write-Host "Runtime gems: $($runtimeGems -join ', ')"
          foreach ($gemName in $runtimeGems) {
            & $gemExe install $gemName --clear-sources --source https://rubygems.org --force
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Lich runtime gem closure failed: gem install $gemName failed."
              exit $LASTEXITCODE
            }
          }
          Write-Host "::endgroup::"

          Write-Host "::group::Repack native runtime gems"
          foreach ($gemName in $nativeRuntimeRepackGems) {
            if ($runtimeGems -notcontains $gemName) {
              Write-Host "Skipping native repack for $gemName because it is not in lich-runtime-gems."
              continue
            }

            $repackScript = @(
              'require "fileutils"',
              'require "rubygems"',
              '',
              'gem_name = ARGV.fetch(0)',
              'platform = ENV.fetch("GEM_PLATFORM")',
              'repack_parent = File.join(ENV.fetch("RUNNER_TEMP"), "native-runtime-repack")',
              'spec = Gem::Specification.find_by_name(gem_name)',
              'source = spec.full_gem_path',
              'target = File.join(repack_parent, "#{spec.name}-#{spec.version}")',
              '',
              'FileUtils.rm_rf(target)',
              'FileUtils.mkdir_p(repack_parent)',
              'FileUtils.cp_r("#{source}/.", target)',
              '',
              'Dir.chdir(target) do',
              '  repack = spec.dup',
              '  repack.platform = Gem::Platform.new(platform)',
              '  repack.extensions = []',
              '  repack.files = Dir.glob("**/*", File::FNM_DOTMATCH).reject do |path|',
              '    path == "." || path == ".." || File.directory?(path) || path.end_with?(".gem")',
              '  end',
              '  File.write("#{gem_name}.gemspec", repack.to_ruby)',
              'end',
              '',
              'puts target',
              'puts spec.version'
            ) -join "`n"

            $repackScriptPath = Join-Path $env:RUNNER_TEMP "repack-$gemName.rb"
            Set-Content -Path $repackScriptPath -Value $repackScript -Encoding ascii
            $metadata = @(& $rubyExe $repackScriptPath $gemName)
            if ($LASTEXITCODE -ne 0 -or $metadata.Count -lt 2) {
              Write-Error "Lich runtime gem closure failed: native repack preparation failed for $gemName."
              exit 1
            }
            $repackDir = $metadata[0].Trim()
            $repackVersion = $metadata[1].Trim()
            if (!(Test-Path $repackDir)) {
              Write-Error "Lich runtime gem closure failed: native repack directory was not created for $gemName at $repackDir."
              exit 1
            }

            Push-Location $repackDir
            & $gemExe build "$gemName.gemspec"
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              Write-Error "Lich runtime gem closure failed: native repack gem build failed for $gemName."
              exit $LASTEXITCODE
            }

            $repackedGem = Get-ChildItem -Path $repackDir -Filter "$gemName-$repackVersion-$env:GEM_PLATFORM.gem" -File |
              Select-Object -First 1
            if (-not $repackedGem) {
              Pop-Location
              Write-Error "Lich runtime gem closure failed: expected repacked gem $gemName-$repackVersion-$env:GEM_PLATFORM.gem was not produced."
              exit 1
            }
            Copy-Item $repackedGem.FullName (Join-Path $pkgDir $repackedGem.Name) -Force
            & $gemExe install $repackedGem.FullName --local --force
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              Write-Error "Lich runtime gem closure failed: local install failed for repacked $($repackedGem.Name)."
              exit $LASTEXITCODE
            }
            Pop-Location
            Write-Host "$gemName => $($repackedGem.Name)"
          }
          Write-Host "::endgroup::"

          $runtimeGemExcludes = @(
            'bigdecimal',
            'debug',
            'fiddle',
            'irb',
            'minitest',
            'native-package-installer',
            'nkf',
            'pkg-config',
            'power_assert',
            'racc',
            'rake',
            'rbs',
            'rdoc',
            'reline',
            'repl_type_completor',
            'test-unit',
            'typeprof',
            'win32ole'
          )
          $env:RUNTIME_GEM_EXCLUDES = $runtimeGemExcludes -join ' '
          "RUNTIME_GEM_EXCLUDES=$env:RUNTIME_GEM_EXCLUDES" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          $manifestScript = @(
            'require "rubygems"',
            'require "set"',
            '',
            'requested = ENV.fetch("LICH_RUNTIME_GEMS").split(/[,\s]+/).reject(&:empty?)',
            'excluded = ENV.fetch("RUNTIME_GEM_EXCLUDES").split(/[,\s]+/).reject(&:empty?).to_set',
            'queue = requested.dup',
            'selected = {}',
            '',
            'until queue.empty?',
            '  name = queue.shift',
            '  next if name.nil? || name.empty? || excluded.include?(name)',
            '  specs = Gem::Specification.find_all_by_name(name)',
            '  spec = specs.reject(&:default_gem?).max_by(&:version) || specs.max_by(&:version)',
            '  abort("runtime gem manifest failed: installed gem #{name.inspect} was not found") unless spec',
            '  next if spec.default_gem? || excluded.include?(spec.name) || selected.key?(spec.name)',
            '  selected[spec.name] = spec',
            '  spec.runtime_dependencies.each do |dependency|',
            '    queue << dependency.name unless excluded.include?(dependency.name) || selected.key?(dependency.name)',
            '  end',
            'end',
            '',
            'selected.values.sort_by(&:name).each do |spec|',
            '  puts [spec.name, spec.version.to_s, spec.full_name].join("\t")',
            'end'
          ) -join "`n"
          $manifestScriptPath = Join-Path $env:RUNNER_TEMP 'runtime-gem-manifest.rb'
          Set-Content -Path $manifestScriptPath -Value $manifestScript -Encoding ascii

          $manifestRows = @(& $rubyExe $manifestScriptPath)
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Lich runtime gem closure failed: runtime gem manifest generation failed."
            exit $LASTEXITCODE
          }

          $manifestPath = Join-Path $pkgDir 'runtime-gems-manifest.txt'
          $installTargetsPath = Join-Path $pkgDir 'runtime-gems-install-targets.txt'
          $installScriptPath = Join-Path $pkgDir 'install-runtime-gems.cmd'
          $cacheRoots = @(
            (Join-Path $rubyRoot 'lib\ruby\gems\4.0.0\cache')
            (Join-Path $env:USERPROFILE '.local\share\gem\ruby\4.0.0\cache')
          ) | Where-Object { Test-Path $_ } | Sort-Object -Unique

          $manifestFiles = [System.Collections.Generic.List[string]]::new()
          $prebuiltPackageGemNames = @(
            'glib2',
            'gobject-introspection',
            'gio2',
            'cairo',
            'cairo-gobject',
            'pango',
            'gdk_pixbuf2',
            'atk',
            'gdk3',
            'gtk3'
          )
          Write-Host "::group::Collect manifest-selected runtime gem files"
          foreach ($gemName in $prebuiltPackageGemNames) {
            $platformGem = Get-ChildItem -Path $pkgDir -Filter "$gemName-*.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $platformGem) {
              Write-Error "Lich runtime gem closure failed: expected prebuilt package gem $gemName was not found in pkg."
              exit 1
            }
            $manifestFiles.Add($platformGem.Name)
            Write-Host $platformGem.Name
          }
          foreach ($row in $manifestRows) {
            if ([string]::IsNullOrWhiteSpace($row)) {
              continue
            }
            $parts = $row -split "`t"
            if ($parts.Count -lt 3) {
              Write-Error "Lich runtime gem closure failed: malformed manifest row: $row"
              exit 1
            }
            $gemName = $parts[0]
            $fullName = $parts[2]
            $fileName = "$fullName.gem"
            $existingPkgGem = Join-Path $pkgDir $fileName
            if (Test-Path $existingPkgGem) {
              $manifestFiles.Add($fileName)
              Write-Host $fileName
              continue
            }

            $sourceGem = $null
            foreach ($cacheRoot in $cacheRoots) {
              $candidate = Join-Path $cacheRoot $fileName
              if (Test-Path $candidate) {
                $sourceGem = $candidate
                break
              }
            }
            if (-not $sourceGem) {
              Write-Error "Lich runtime gem closure failed: manifest selected $fileName for $gemName, but no matching .gem file was found in pkg or RubyGems cache."
              exit 1
            }
            Copy-Item $sourceGem (Join-Path $pkgDir $fileName) -Force
            $manifestFiles.Add($fileName)
            Write-Host $fileName
          }
          Write-Host "::endgroup::"

          $seenManifestFiles = [System.Collections.Hashtable]::new([StringComparer]::OrdinalIgnoreCase)
          $manifestFiles = @($manifestFiles | Where-Object {
            if ($seenManifestFiles.ContainsKey($_)) {
              $false
            } else {
              $seenManifestFiles[$_] = $true
              $true
            }
          })
          Set-Content -Path $manifestPath -Value $manifestFiles -Encoding ascii

          $installTargets = @($runtimeGems | Where-Object {
            $runtimeGemExcludes -notcontains $_
          } | Sort-Object -Unique)
          if ($installTargets.Count -eq 0) {
            Write-Error "Lich runtime gem closure failed: no runtime install targets were selected."
            exit 1
          }
          Set-Content -Path $installTargetsPath -Value $installTargets -Encoding ascii
          $installScript = @(
            '@echo off',
            'setlocal',
            'pushd "%~dp0"',
            'for /f "usebackq delims=" %%G in ("runtime-gems-install-targets.txt") do (',
            '  gem install --local --no-document "%%G"',
            '  if errorlevel 1 exit /b 1',
            ')',
            'popd',
            'endlocal'
          ) -join "`r`n"
          Set-Content -Path $installScriptPath -Value $installScript -Encoding ascii

          foreach ($gemName in $nativeRuntimeRepackGems) {
            $platformGem = Get-ChildItem -Path $pkgDir -Filter "$gemName-*$env:GEM_PLATFORM.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d.*-$([regex]::Escape($env:GEM_PLATFORM))\.gem$" } |
              Select-Object -First 1
            if ($platformGem) {
              Get-ChildItem -Path $pkgDir -Filter "$gemName-*.gem" -File |
                Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d" -and $_.Name -ne $platformGem.Name } |
                Remove-Item -Force
            }
          }

          Write-Host "::group::Installed Lich runtime gems"
          foreach ($gemName in $runtimeGems) {
            & $gemExe list $gemName
          }
          Write-Host "::endgroup::"

          Write-Host "::group::Validate native runtime binary gems"
          foreach ($gemName in $nativeRuntimeGems) {
            $platformGem = Get-ChildItem -Path $pkgDir -Filter "$gemName-*$env:GEM_PLATFORM.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d.*-$([regex]::Escape($env:GEM_PLATFORM))\.gem$" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $platformGem) {
              Write-Error "Lich runtime gem closure failed: $gemName installed, but no $env:GEM_PLATFORM binary gem was collected in pkg. Do not ship a source native gem that requires DevKit on install."
              exit 1
            }
            Write-Host "$gemName => $($platformGem.Name)"
          }
          Write-Host "::endgroup::"

      - name: Smoke local GTK3 suite
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $rubyRoot = $env:RUBY_ROOT
          $rubyExe = $env:RUBY_EXE
          $gemExe = $env:GEM_EXE
          $env:Path = "$rubyRoot\bin;$msys\$prefix\bin;$msys\usr\bin;$env:Path"

          $giGemDir = & $rubyExe -e "require 'rubygems'; print Gem::Specification.find_by_name('gobject-introspection').full_gem_path"
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($giGemDir)) {
            Write-Error "Ruby4 GTK3/Lich runtime smoke failed: could not resolve installed gobject-introspection gem path."
            exit 1
          }
          $glib2GemDir = & $rubyExe -e "require 'rubygems'; print Gem::Specification.find_by_name('glib2').full_gem_path"
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($glib2GemDir)) {
            Write-Error "Ruby4 GTK3/Lich runtime smoke failed: could not resolve installed glib2 gem path."
            exit 1
          }
          $runtimeVendorBin = Join-Path $glib2GemDir 'vendor\local\bin'
          $giVendorTypelib = Join-Path $giGemDir 'vendor\local\lib\girepository-1.0'
          $giRuntimeDlls = @(Get-ChildItem -Path $runtimeVendorBin -Filter 'libgirepository*.dll' -File -ErrorAction SilentlyContinue)
          if ($giRuntimeDlls.Count -eq 0) {
            Write-Error "Ruby4 GTK3/Lich runtime smoke failed: expected bundled GI runtime DLL missing under $runtimeVendorBin."
            exit 1
          }
          $env:Path = "$runtimeVendorBin;$env:Path"
          if (Test-Path $giVendorTypelib) {
            $env:GI_TYPELIB_PATH = $giVendorTypelib
          }

          Write-Host "::group::Local GTK3 suite gems"
          foreach ($gemName in @(
            'glib2',
            'gobject-introspection',
            'gio2',
            'cairo',
            'cairo-gobject',
            'pango',
            'gdk_pixbuf2',
            'atk',
            'gdk3',
            'gtk3',
            'sqlite3',
            'ox',
            'ascii_charts',
            'curses',
            'concurrent-ruby',
            'ffi',
            'kramdown',
            'os',
            'redis',
            'sequel',
            'set',
            'terminal-table',
            'tzinfo',
            'tzinfo-data',
            'webrick'
          )) {
            & $gemExe list $gemName
          }
          Write-Host "Runtime vendor bin: $runtimeVendorBin"
          Write-Host "GI_TYPELIB_PATH=$env:GI_TYPELIB_PATH"
          Write-Host "::endgroup::"

          & $rubyExe -e "require 'sqlite3'; require 'ox'; require 'ffi'; require 'ascii_charts'; require 'kramdown'; require 'webrick'; require 'redis'; require 'sequel'; require 'set'; require 'terminal-table'; require 'tzinfo'; require 'curses'; require 'os'; require 'glib2'; require 'cairo'; require 'gtk3'; Gtk.init; puts 'Ruby4 GTK3/Lich runtime smoke OK'"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Ruby4 GTK3/Lich runtime smoke failed."
            exit $LASTEXITCODE
          }

      - name: Package Lich runtime gem bundle
        shell: powershell
        run: |
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          $distDir = Join-Path $env:GITHUB_WORKSPACE 'dist'
          $stagedPkgDir = Join-Path $distDir 'pkg'
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null
          if (Test-Path $stagedPkgDir) {
            Remove-Item $stagedPkgDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stagedPkgDir -Force | Out-Null

          $manifestPath = Join-Path $pkgDir 'runtime-gems-manifest.txt'
          $installTargetsPath = Join-Path $pkgDir 'runtime-gems-install-targets.txt'
          $installScriptPath = Join-Path $pkgDir 'install-runtime-gems.cmd'
          if (!(Test-Path $manifestPath)) {
            Write-Error "Lich runtime gem bundle failed: runtime-gems-manifest.txt is missing from $pkgDir."
            exit 1
          }
          if (!(Test-Path $installTargetsPath)) {
            Write-Error "Lich runtime gem bundle failed: runtime-gems-install-targets.txt is missing from $pkgDir."
            exit 1
          }
          if (!(Test-Path $installScriptPath)) {
            Write-Error "Lich runtime gem bundle failed: install-runtime-gems.cmd is missing from $pkgDir."
            exit 1
          }

          $manifestFiles = @(Get-Content $manifestPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          if ($manifestFiles.Count -eq 0) {
            Write-Error "Lich runtime gem bundle failed: runtime-gems-manifest.txt is empty."
            exit 1
          }

          $excludedPackageNames = @(
            'benchmark',
            'bigdecimal',
            'debug',
            'fiddle',
            'irb',
            'minitest',
            'native-package-installer',
            'nkf',
            'pkg-config',
            'power_assert',
            'racc',
            'rake',
            'rbs',
            'rdoc',
            'reline',
            'repl_type_completor',
            'test-unit',
            'typeprof',
            'win32ole'
          )
          foreach ($excludedPackageName in $excludedPackageNames) {
            $escaped = [regex]::Escape($excludedPackageName)
            $matches = @($manifestFiles | Where-Object { $_ -match "^$escaped-\d" })
            if ($matches.Count -gt 0) {
              Write-Host "::group::Excluded runtime gems in manifest"
              $matches | ForEach-Object { Write-Host $_ }
              Write-Host "::endgroup::"
              Write-Error "Lich runtime gem bundle failed: excluded package gem $excludedPackageName was selected for shipping."
              exit 1
            }
          }

          Write-Host "::group::Lich runtime gem bundle contents"
          foreach ($manifestFile in $manifestFiles) {
            $source = Join-Path $pkgDir $manifestFile
            if (!(Test-Path $source)) {
              Write-Error "Lich runtime gem bundle failed: manifest file $manifestFile is missing from $pkgDir."
              exit 1
            }
            Copy-Item $source (Join-Path $stagedPkgDir $manifestFile) -Force
            Write-Host $manifestFile
          }
          Copy-Item $manifestPath (Join-Path $stagedPkgDir 'runtime-gems-manifest.txt') -Force
          Copy-Item $installTargetsPath (Join-Path $stagedPkgDir 'runtime-gems-install-targets.txt') -Force
          Copy-Item $installScriptPath (Join-Path $stagedPkgDir 'install-runtime-gems.cmd') -Force
          Write-Host "::endgroup::"

          $stagedFiles = @(Get-ChildItem -Path $stagedPkgDir -File)
          if ($stagedFiles.Count -eq 0) {
            Write-Error "Lich runtime gem bundle failed: no staged files were created."
            exit 1
          }

          Write-Host "Staged $($stagedFiles.Count) runtime package files under $stagedPkgDir"

      - name: Smoke packaged runtime gem bundle on clean RubyInstaller
        shell: powershell
        run: |
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'
          $manifestPath = Join-Path $pkgDir 'runtime-gems-manifest.txt'
          $installTargetsPath = Join-Path $pkgDir 'runtime-gems-install-targets.txt'
          if (!(Test-Path $manifestPath)) {
            Write-Error "Clean packaged smoke failed: runtime-gems-manifest.txt is missing from $pkgDir."
            exit 1
          }
          if (!(Test-Path $installTargetsPath)) {
            Write-Error "Clean packaged smoke failed: runtime-gems-install-targets.txt is missing from $pkgDir."
            exit 1
          }

          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"
          if (!(Test-Path $archive)) {
            Write-Error "Clean packaged smoke failed: RubyInstaller archive is missing at $archive."
            exit 1
          }

          $smokeParent = 'C:\Ruby4Lich5\clean-smoke-ruby'
          if (Test-Path $smokeParent) {
            Remove-Item $smokeParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $smokeParent -Force | Out-Null

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }
          & $sevenZip x $archive "-o$smokeParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $smokeParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "Clean packaged smoke failed: ruby.exe was not found under $smokeParent."
            exit 1
          }
          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          $gemExe = Join-Path $rubyRoot 'bin\gem.cmd'
          if (!(Test-Path $gemExe)) {
            Write-Error "Clean packaged smoke failed: gem.cmd was not found at $gemExe."
            exit 1
          }

          $env:Path = "$rubyRoot\bin;C:\Windows\System32;C:\Windows;C:\Windows\System32\Wbem;C:\Windows\System32\WindowsPowerShell\v1.0"
          Remove-Item Env:\RI_DEVKIT -ErrorAction SilentlyContinue
          Remove-Item Env:\MSYSTEM -ErrorAction SilentlyContinue
          Remove-Item Env:\MSYSTEM_PREFIX -ErrorAction SilentlyContinue
          Remove-Item Env:\MINGW_PREFIX -ErrorAction SilentlyContinue
          Remove-Item Env:\PKG_CONFIG_PATH -ErrorAction SilentlyContinue
          Remove-Item Env:\GI_TYPELIB_PATH -ErrorAction SilentlyContinue
          Remove-Item Env:\GDK_PIXBUF_MODULEDIR -ErrorAction SilentlyContinue

          $gemFiles = @(Get-Content $manifestPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | ForEach-Object { Join-Path $pkgDir $_ })
          foreach ($gemFile in $gemFiles) {
            if (!(Test-Path $gemFile)) {
              Write-Error "Clean packaged smoke failed: manifest gem is missing: $gemFile."
              exit 1
            }
          }
          $installTargets = @(Get-Content $installTargetsPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          if ($installTargets.Count -eq 0) {
            Write-Error "Clean packaged smoke failed: runtime-gems-install-targets.txt is empty."
            exit 1
          }

          Push-Location $pkgDir
          & $gemExe install --local --no-document --force @installTargets
          $installExit = $LASTEXITCODE
          Pop-Location
          if ($installExit -ne 0) {
            Write-Error "Clean packaged smoke failed: install targets failed on non-DevKit RubyInstaller."
            exit $installExit
          }

          $excludedPackageNames = @(
            'benchmark',
            'bigdecimal',
            'debug',
            'fiddle',
            'irb',
            'minitest',
            'native-package-installer',
            'nkf',
            'pkg-config',
            'power_assert',
            'racc',
            'rake',
            'rbs',
            'rdoc',
            'reline',
            'repl_type_completor',
            'test-unit',
            'typeprof',
            'win32ole'
          )
          foreach ($excludedPackageName in $excludedPackageNames) {
            $escaped = [regex]::Escape($excludedPackageName)
            $matches = @($gemFiles | Where-Object { (Split-Path $_ -Leaf) -match "^$escaped-\d" })
            if ($matches.Count -gt 0) {
              Write-Host "::group::Excluded runtime gems in packaged smoke"
              $matches | ForEach-Object { Write-Host $_ }
              Write-Host "::endgroup::"
              Write-Error "Clean packaged smoke failed: excluded package gem $excludedPackageName was staged for shipping."
              exit 1
            }
          }

          $fontconfigSmoke = @(
            'require "rubygems"',
            'require "gobject-introspection"',
            '',
            'specs = Gem::Specification.find_all_by_name("gobject-introspection")',
            'abort("gobject-introspection 4.3.4 was installed unexpectedly") if specs.any? { |spec| spec.version.to_s == "4.3.4" }',
            '',
            'spec = Gem::Specification.find_by_name("gobject-introspection")',
            'fontconfig_path = ENV["FONTCONFIG_PATH"]',
            'abort("FONTCONFIG_PATH was not set by gobject-introspection") if fontconfig_path.nil? || fontconfig_path.empty?',
            'abort("FONTCONFIG_PATH contains stale gobject-introspection 4.3.4 path: #{fontconfig_path}") if fontconfig_path.include?("gobject-introspection-4.3.4")',
            '',
            'expected = File.join(spec.full_gem_path, "vendor", "local", "etc", "fonts")',
            'abort("FONTCONFIG_PATH mismatch: expected #{expected}, got #{fontconfig_path}") unless File.expand_path(fontconfig_path) == File.expand_path(expected)',
            '',
            'fonts_conf = File.join(expected, "fonts.conf")',
            'abort("Fontconfig file missing: #{fonts_conf}") unless File.exist?(fonts_conf)',
            'puts "gobject-introspection Fontconfig path OK: #{fontconfig_path}"'
          ) -join "`n"
          $fontconfigSmokePath = Join-Path $env:RUNNER_TEMP 'smoke-gobject-fontconfig.rb'
          Set-Content -Path $fontconfigSmokePath -Value $fontconfigSmoke -Encoding ascii
          & $rubyExe.FullName $fontconfigSmokePath
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: gobject-introspection Fontconfig validation failed on non-DevKit RubyInstaller."
            exit $LASTEXITCODE
          }

          & $rubyExe.FullName -e "require 'sqlite3'; require 'ox'; require 'ffi'; require 'ascii_charts'; require 'kramdown'; require 'webrick'; require 'redis'; require 'sequel'; require 'set'; require 'terminal-table'; require 'tzinfo'; require 'curses'; require 'os'; require 'cairo'; require 'gtk3'; Gtk.init; puts 'Clean packaged Ruby4/Lich runtime smoke OK'"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: runtime require set failed on non-DevKit RubyInstaller."
            exit $LASTEXITCODE
          }

      - name: Upload Lich runtime gems
        uses: actions/upload-artifact@v4
        with:
          name: ruby4-lich5-runtime-gems-windows-ucrt64
          path: |
            dist/pkg/*
          retention-days: 90
          if-no-files-found: error
